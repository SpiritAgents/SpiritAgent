name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  NODE_VERSION: '20'
  CSC_IDENTITY_AUTO_DISCOVERY: 'false'

jobs:
  verify:
    name: Verify release version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify versions
        run: npm run release:verify-version -- --version "$RELEASE_TAG"

  cli:
    name: CLI ${{ matrix.package_target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            package_target: windows-x64
            builder: cargo
          - os: windows-latest
            rust_target: i686-pc-windows-msvc
            package_target: windows-ia32
            builder: cargo
          - os: windows-latest
            rust_target: aarch64-pc-windows-msvc
            package_target: windows-arm64
            builder: cargo
          - os: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            package_target: linux-x64
            builder: cargo
          - os: ubuntu-24.04
            rust_target: aarch64-unknown-linux-gnu
            package_target: linux-arm64
            builder: cross
          - os: macos-13
            rust_target: x86_64-apple-darwin
            package_target: macos-x64
            builder: cargo
          - os: macos-14
            rust_target: aarch64-apple-darwin
            package_target: macos-arm64
            builder: cargo
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            packages/agent-core/package-lock.json
            packages/host-internal/package-lock.json

      - name: Install TypeScript package dependencies
        shell: bash
        run: |
          npm ci --prefix packages/agent-core
          npm ci --prefix packages/host-internal

      - name: Build TypeScript runtime
        run: npm run build:agent-core && npm run build:host-internal

      - name: Setup Rust target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install cross
        if: matrix.builder == 'cross'
        run: cargo install cross --locked

      - name: Build CLI
        if: matrix.builder == 'cargo'
        run: cargo build -p spirit-agent --release --target ${{ matrix.rust_target }}

      - name: Build CLI with cross
        if: matrix.builder == 'cross'
        run: cross build -p spirit-agent --release --target ${{ matrix.rust_target }}

      - name: Bundle CLI
        run: npm run release:cli:bundle -- --target ${{ matrix.rust_target }} --version ${RELEASE_TAG#v}
        shell: bash

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.package_target }}
          path: dist/release/SpiritAgent-CLI-*
          if-no-files-found: error

  desktop:
    name: Desktop ${{ matrix.package_target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
            package_target: windows-x64
          - os: windows-latest
            platform: win
            arch: ia32
            package_target: windows-ia32
          - os: windows-latest
            platform: win
            arch: arm64
            package_target: windows-arm64
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            package_target: linux-x64
          - os: ubuntu-24.04
            platform: linux
            arch: arm64
            package_target: linux-arm64
          - os: macos-13
            platform: mac
            arch: x64
            package_target: macos-x64
          - os: macos-14
            platform: mac
            arch: arm64
            package_target: macos-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            packages/agent-core/package-lock.json
            packages/host-internal/package-lock.json
            apps/desktop/package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          npm ci --prefix packages/agent-core
          npm ci --prefix packages/host-internal
          npm ci --prefix apps/desktop

      - name: Build Desktop
        run: npm --prefix apps/desktop run build

      - name: Package Desktop
        working-directory: apps/desktop
        run: npx electron-builder --config electron-builder.yml --${{ matrix.platform }} --${{ matrix.arch }}

      - name: Upload Desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.package_target }}
          path: apps/desktop/release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - cli
      - desktop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: node scripts/release/checksums.mjs release-assets release-assets/SHA256SUMS.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          notes="$(cat <<EOF
          Spirit Agent ${RELEASE_TAG}

          This release includes CLI and Desktop artifacts for Windows, Linux, and macOS.

          Desktop artifacts are unsigned unless signing secrets are configured.
          EOF
          )"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* --title "$RELEASE_TAG" --notes "$notes"
          fi
