name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  NODE_VERSION: '22'
  SPIRIT_RELEASE_NODE_MAJOR: '22'
  CSC_IDENTITY_AUTO_DISCOVERY: 'false'

jobs:
  verify:
    name: Verify release version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org/

      - name: Verify versions
        run: npm run release:verify-version -- --version "$RELEASE_TAG"

  cli:
    name: CLI ${{ matrix.package_target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            package_target: windows-x64
            builder: cargo
          - os: windows-latest
            rust_target: i686-pc-windows-msvc
            package_target: windows-ia32
            builder: cargo
          - os: windows-latest
            rust_target: aarch64-pc-windows-msvc
            package_target: windows-arm64
            builder: cargo
          - os: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            package_target: linux-x64
            builder: cargo
          - os: ubuntu-24.04
            rust_target: aarch64-unknown-linux-gnu
            package_target: linux-arm64
            builder: cross
          - os: macos-15-intel
            rust_target: x86_64-apple-darwin
            package_target: macos-x64
            builder: cargo
          - os: macos-14
            rust_target: aarch64-apple-darwin
            package_target: macos-arm64
            builder: cargo
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org/
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript runtime
        run: npm run build:agent-core && npm run build:host-internal

      - name: Setup Rust target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install cross
        if: matrix.builder == 'cross'
        run: cargo install cross --locked

      - name: Build CLI
        if: matrix.builder == 'cargo'
        run: cargo build -p spirit-agent --release --target ${{ matrix.rust_target }}

      - name: Build CLI with cross
        if: matrix.builder == 'cross'
        run: cross build -p spirit-agent --release --target ${{ matrix.rust_target }}

      - name: Bundle CLI
        run: npm run release:cli:bundle -- --target ${{ matrix.rust_target }} --version ${RELEASE_TAG#v}
        shell: bash

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.package_target }}
          path: dist/release/SpiritAgent-CLI-*
          if-no-files-found: error

  desktop:
    name: Desktop ${{ matrix.package_target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
            package_target: windows-x64
          - os: windows-latest
            platform: win
            arch: ia32
            package_target: windows-ia32
          - os: windows-latest
            platform: win
            arch: arm64
            package_target: windows-arm64
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            package_target: linux-x64
          - os: ubuntu-24.04
            platform: linux
            arch: arm64
            package_target: linux-arm64
          - os: macos-15-intel
            platform: mac
            arch: x64
            package_target: macos-x64
          - os: macos-14
            platform: mac
            arch: arm64
            package_target: macos-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org/
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/desktop/package-lock.json

      - name: Normalize root lockfile
        run: node scripts/release/prune-root-lockfile-desktop.mjs

      - name: Install shared package dependencies
        run: npm ci

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: |
          rm -rf node_modules
          npm --no-workspaces ci

      - name: Build Desktop
        working-directory: apps/desktop
        run: npm --no-workspaces run build

      - name: Verify packager icons
        working-directory: apps/desktop
        run: npm run gen:icons

      - name: Package Desktop
        working-directory: apps/desktop
        env:
          npm_config_registry: https://registry.npmjs.org/
          npm_config_electron_mirror: https://github.com/electron/electron/releases/download/
          npm_config_electron_builder_binaries_mirror: https://github.com/electron-userland/electron-builder-binaries/releases/download/
          ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/
        run: npx electron-builder --config electron-builder.yml --${{ matrix.platform }} --${{ matrix.arch }} --publish never

      - name: Upload Desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.package_target }}
          # electron-builder leaves *-unpacked dirs when packaging Linux; exclude them.
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.dmg
            apps/desktop/release/*.exe
            apps/desktop/release/*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - cli
      - desktop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: node scripts/release/checksums.mjs release-assets release-assets/SHA256SUMS.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mapfile -d '' -t assets < <(find release-assets -maxdepth 1 -type f -print0)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found under release-assets" >&2
            exit 1
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --title "$RELEASE_TAG" --generate-notes
          fi
