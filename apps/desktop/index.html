<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spirit Agent</title>
    <script>
      (function () {
        if (!/\bElectron\//.test(navigator.userAgent)) return;
        var root = document.documentElement;
        root.classList.add("spirit-desktop-native", "spirit-launch-splash-active");
        var mica = true;
        try {
          if (window.spiritDesktop && window.spiritDesktop.readNativeBackdropBlur() === false) {
            mica = false;
          }
        } catch (_err) {}
        if (mica) root.classList.add("spirit-desktop-mica");
      })();
    </script>
    <style>
      html.spirit-desktop-native.spirit-desktop-mica,
      html.spirit-desktop-native.spirit-desktop-mica body {
        background: transparent !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
