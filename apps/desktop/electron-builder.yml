appId: ai.spiritagent.desktop
productName: Spirit Agent
artifactName: SpiritAgent-Desktop-${version}-${os}-${arch}.${ext}
directories:
  output: release
files:
  - package.json
  - dist/**/*
  - dist-electron/**/*
  - node_modules/**/*
  - '!node_modules/spirit-agent-repo/**/*'
  - '!node_modules/**/spirit-agent-repo/**/*'
  - '!**/target/**/*'
  - ../../packages/agent-core/dist/**/*
  - ../../packages/agent-core/package.json
  - ../../packages/host-internal/dist/**/*
  - ../../packages/host-internal/package.json
extraMetadata:
  main: dist-electron/electron/main.js
asarUnpack:
  - node_modules/node-pty/**/*
  - node_modules/koffi/**/*
  - node_modules/@napi-rs/keyring/**/*
npmRebuild: true
buildDependenciesFromSource: false
publish: null
win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
        - arm64
    - target: zip
      arch:
        - x64
        - ia32
        - arm64
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  category: Development
