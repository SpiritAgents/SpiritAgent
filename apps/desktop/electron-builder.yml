appId: ai.spiritagent.desktop
productName: Spirit Agent
icon: build/icon.ico
artifactName: SpiritAgent-Desktop-${version}-${os}-${arch}.${ext}
directories:
  buildResources: build
  output: release
files:
  - package.json
  - dist/**/*
  - dist-electron/**/*
  - node_modules/**/*
  - '!node_modules/spirit-agent-repo/**/*'
  - '!node_modules/**/spirit-agent-repo/**/*'
  - '!**/target/**/*'
  - ../../packages/agent-core/dist/**/*
  - ../../packages/agent-core/package.json
  - ../../packages/host-internal/dist/**/*
  - ../../packages/host-internal/package.json
extraMetadata:
  main: dist-electron/electron/main.js
asarUnpack:
  - node_modules/node-pty/**/*
  - node_modules/koffi/**/*
  - node_modules/@napi-rs/keyring/**/*
npmRebuild: true
buildDependenciesFromSource: false
publish: null
extraResources:
  - from: native/win-uia-helper/bin/Release/net8.0-windows
    to: native/win-uia-helper
    filter:
      - spirit-win-uia.exe
      - spirit-win-uia.dll
      - spirit-win-uia.deps.json
      - spirit-win-uia.runtimeconfig.json
win:
  target:
    - nsis
    - zip
  verifyUpdateCodeSignature: false
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
mac:
  icon: build/icon.png
  target:
    - dmg
    - zip
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
linux:
  maintainer: Spirit Agent contributors <121384036+N123999@users.noreply.github.com>
  target:
    - AppImage
    - deb
  category: Development
