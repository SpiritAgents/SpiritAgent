appId: ai.spiritagent.desktop
productName: Spirit Agent
icon: public/favicon.ico
artifactName: SpiritAgent-Desktop-${version}-${os}-${arch}.${ext}
directories:
  output: release
files:
  - package.json
  - dist/**/*
  - dist-electron/**/*
  - node_modules/**/*
  - '!node_modules/spirit-agent-repo/**/*'
  - '!node_modules/**/spirit-agent-repo/**/*'
  - '!**/target/**/*'
  - ../../packages/agent-core/dist/**/*
  - ../../packages/agent-core/package.json
  - ../../packages/host-internal/dist/**/*
  - ../../packages/host-internal/package.json
extraMetadata:
  main: dist-electron/electron/main.js
asarUnpack:
  - node_modules/node-pty/**/*
  - node_modules/koffi/**/*
  - node_modules/@napi-rs/keyring/**/*
npmRebuild: true
buildDependenciesFromSource: false
publish: null
win:
  target:
    - nsis
    - zip
  verifyUpdateCodeSignature: false
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
    - zip
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
linux:
  maintainer: Spirit Agent contributors <121384036+N123999@users.noreply.github.com>
  target:
    - AppImage
    - deb
  category: Development
